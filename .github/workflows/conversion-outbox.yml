name: Conversion Outbox

# F1 trackeo-conversiones-ventas. Drena conversion_outbox y entrega cada venta
# a su destino (Google Ads…). At-least-once + idempotente + DLQ en el worker.
#
# Arranque seguro: con ADS_CONVERSION_UPLOAD_ENABLED sin setear, el endpoint
# corre en validate-only (no escribe en Ads; las filas quedan pending). Activar
# el envío real = poner ADS_CONVERSION_UPLOAD_ENABLED=true en el entorno.
#
# Roadmap: docs/roadmap/trackeo-conversiones-ventas.md

on:
  # SCHEDULE RETIRADO (23/06/2026). GitHub Actions descartaba la mayoría de los
  # ticks `*/15`: la cadencia REAL medida era ~2,6h (mediana, hasta 6h), que era
  # la causa raíz DOMINANTE de las conversiones en DLQ (incidente 19-23/06). El
  # drain lo dispara ahora el worker Fargate caliente cada 2 min, de forma fiable
  # (backend/src/conversion-drain). Este workflow se deja SOLO como escape-hatch
  # manual (workflow_dispatch) por si hace falta forzar un drain desde GHA.
  workflow_dispatch:

jobs:
  drain-outbox:
    runs-on: ubuntu-latest

    steps:
      - name: Call conversion-outbox endpoint
        id: drain
        run: |
          URL="https://www.vence.es/api/cron/conversion-outbox"

          RESPONSE=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${URL}")

          echo "Response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          SCANNED=$(echo "$RESPONSE" | jq -r '.scanned // 0')
          DELIVERED=$(echo "$RESPONSE" | jq -r '.delivered // 0')
          VALIDATED=$(echo "$RESPONSE" | jq -r '.validated // 0')
          RETRIED=$(echo "$RESPONSE" | jq -r '.retried // 0')
          DLQ=$(echo "$RESPONSE" | jq -r '.dlq // 0')
          DRYRUN=$(echo "$RESPONSE" | jq -r '.dryRun // true')

          echo "dlq=$DLQ" >> $GITHUB_OUTPUT

          echo "📤 Conversion outbox - $(date)"
          echo "   scanned=$SCANNED delivered=$DELIVERED validated=$VALIDATED retried=$RETRIED dlq=$DLQ dryRun=$DRYRUN"

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Cron endpoint failed"
            exit 1
          fi

      - name: Warn on DLQ
        if: steps.drain.outputs.dlq != '0'
        run: echo "::warning::conversion_outbox DLQ=${{ steps.drain.outputs.dlq }} — conversiones que no se pudieron entregar tras 5 reintentos. Inspeccionar."
