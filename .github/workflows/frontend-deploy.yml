name: Deploy frontend (Bloque 5 Fase E)

# Construye la imagen Docker de Next.js (output:'standalone') y la sube
# al repo ECR `vence-frontend` en eu-west-2.
#
# Este workflow NO actualiza ningún ECS service todavía (E.2 lo añade).
# Solo deja la imagen en ECR para que la próxima etapa pueda referenciarla.
#
# Triggers:
#   - workflow_dispatch (manual): cualquier rama.
#   - push a main: solo si cambia código que afecte al build del frontend.
#     paths-ignore excluye backend/, scripts/, docs/, data/ (mantienen
#     ciclos de despliegue independientes).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - 'docs/**'
      - 'scripts/**'
      - 'data/**'
      - '__tests__/**'
      # Workflows GHA propios — modificar un YAML de CI/CD no implica
      # redeploy del frontend. Descubierto 27/05/2026 al pushear el
      # workflow e2e-smoke.yml: disparó frontend-deploy idle gastando
      # ~10 min CI por cambio. Si alguien quiere forzar redeploy tras
      # tocar un workflow, usar workflow_dispatch.
      - '.github/workflows/**'
      - '*.md'
  workflow_dispatch:

# Serializa los deploys: si llegan varios pushes seguidos (incl. de sesiones
# paralelas), cancela los runs en vuelo y deja solo el último → SIEMPRE se
# despliega el HEAD de main, nunca una build de un commit anterior pisa a la
# nueva. Descubierto 03/06/2026: deploys concurrentes hacían que el último en
# TERMINAR ganara (no el último commit), dejando código viejo en prod.
concurrency:
  group: vence-frontend-deploy
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: vence-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compose dos tags: latest + SHA corto. SHA permite rollback puntual,
      # latest permite seguir el "tip de main" con `vence-frontend:latest`.
      - name: Resolve image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_REGISTRY="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "tag_sha=${IMAGE_REGISTRY}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${IMAGE_REGISTRY}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          # Cache cross-builds para no rebajar el next build cada vez.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}
          # NEXT_PUBLIC_* van como build-args (Next.js los inlinea en el bundle).
          # Server-side build-args (DATABASE_URL, SUPABASE_SERVICE_ROLE_KEY)
          # son necesarios porque Vence consulta BD durante prerender SSG
          # (~500 páginas). Vercel inyecta TODAS las env vars al build; con
          # Docker hermético los pasamos explícitos. La imagen final
          # (multi-stage stage 3) NO incluye estas envs — solo el builder.
          # Resto de envs runtime las recibe ECS via SSM.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_STRIPE_PRICE_MONTHLY=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_MONTHLY }}
            NEXT_PUBLIC_STRIPE_PRICE_QUARTERLY=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_QUARTERLY }}
            NEXT_PUBLIC_STRIPE_PRICE_SEMESTER=${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_SEMESTER }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
            NEXT_PUBLIC_SITE_URL=https://www.vence.es
            NEXT_PUBLIC_APP_NAME=Vence
            NEXT_PUBLIC_SUPPORT_EMAIL=info@vence.es
            NEXT_PUBLIC_USE_CHAT_V2=true
            # Cloudflare Turnstile: site key es PÚBLICA (va en el bundle), literal.
            NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY=0x4AAAAAADd5nFRd3Kqg6rn7
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_URL_REPLICA=${{ secrets.DATABASE_URL_REPLICA }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            GIT_COMMIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_GIT_COMMIT_SHA=${{ github.sha }}

      # Registra nueva task definition revision con el digest específico
      # del SHA recién pusheado, y actualiza el service para que use esa
      # revision. Esto resuelve el anti-patrón del incidente 2026-05-26
      # (postmortem #115):
      #
      # - ANTES: terraform creaba task def con `:latest` tag y el service
      #   pineaba el SHA al arrancar. Si lifecycle policy de ECR purgaba
      #   ese SHA (porque un push posterior sobrescribió :latest), los
      #   restarts post-OOM fallaban con CannotPullContainerError.
      #
      # - AHORA: cada deploy registra task def con `repo@sha256:<digest>`
      #   específico (inmutable). ECS pula exactamente esa imagen, que
      #   SIEMPRE existe en ECR porque acabamos de pushearla.
      #
      # Rolling deploy: ECS arranca task nuevo con la nueva revision,
      # espera healthcheck del ALB, drena el viejo (30s), lo mata.
      # Zero downtime garantizado por el deployment circuit breaker.
      - name: Registrar nueva task definition + update-service
        env:
          IMAGE_URI: ${{ steps.meta.outputs.tag_sha }}
        run: |
          # 1. Obtener el digest real del :sha que acabamos de pushear.
          #    El push de docker/build-push-action no devuelve digest, lo
          #    leemos de ECR (más fiable que confiar en el tag mutable).
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          DIGEST=$(aws ecr describe-images \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageTag="$SHA_SHORT" \
            --region "${{ env.AWS_REGION }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          REGISTRY="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          IMAGE_PINNED="${REGISTRY}@${DIGEST}"
          echo "Image pin: $IMAGE_PINNED"

          # 2. Obtener la task def más reciente (terraform-base + cualquier
          #    cambio aplicado). Limpia campos read-only.
          #
          # El jq filter no solo cambia la imagen — también GARANTIZA por
          # construcción que los campos críticos de la HA (Fase 6 pool-
          # segregation, 2026-06-01) están presentes en cada nueva revision:
          #
          #   - secrets[USE_SELF_HOSTED_POOLER]: feature flag que enruta el
          #     pool al self-hosted PgBouncer (pooler.vence.es vía AWS NLB).
          #   - secrets[DATABASE_URL_SELF_POOLER]: DSN del pooler.
          #   - healthCheck container-level: ECS verifica /api/health/db-ready
          #     antes de marcar el container ready. Sin esto, container con
          #     pool muerto recibiría tráfico durante el rolling.
          #
          # MOTIVO: el 2026-06-01 una sesión paralela registró task def :77
          # sin estos campos, tirando momentáneamente la HA. El bug raíz era
          # que el filter jq no era idempotente — si la revision base venía
          # sin los campos, el deploy heredaba la regresión. Ahora el filter
          # los re-aplica siempre, por tanto cualquier base es válida.
          aws ecs describe-task-definition \
            --task-definition vence-frontend \
            --region "${{ env.AWS_REGION }}" \
            --query 'taskDefinition' \
          | jq --arg IMAGE "$IMAGE_PINNED" --arg ACCOUNT_ID "349744179687" --arg REGION "${{ env.AWS_REGION }}" '
              # Helper inline para añadir un secret SSM si no existe ya.
              def ensure_secret(name):
                .containerDefinitions[0].secrets |= (
                  if (map(.name) | index(name)) == null then
                    . + [{name: name, valueFrom: ("arn:aws:ssm:" + $REGION + ":" + $ACCOUNT_ID + ":parameter/vence-frontend/" + name)}]
                  else
                    .
                  end
                );

              .containerDefinitions[0].image = $IMAGE
              | ensure_secret("USE_SELF_HOSTED_POOLER")
              | ensure_secret("DATABASE_URL_SELF_POOLER")
              # Turnstile (anti-scraping). Params SSM creados 03/06; ECS los inyecta.
              | ensure_secret("CLOUDFLARE_TURNSTILE_SECRET_KEY")
              | ensure_secret("CAPTCHA_ENABLED")
              # Google Ads — credenciales + flag de subida de conversiones de venta
              # (F1 trackeo-conversiones-ventas). Params SSM creados 03/06. El cron
              # /api/cron/conversion-outbox y el adapter los necesitan para subir
              # las compras (OCI) a Google Ads. ADS_CONVERSION_UPLOAD_ENABLED=false
              # por defecto → validate-only; flip a true en SSM para envío real.
              | ensure_secret("GOOGLE_ADS_CLIENT_ID")
              | ensure_secret("GOOGLE_ADS_CLIENT_SECRET")
              | ensure_secret("GOOGLE_ADS_DEVELOPER_TOKEN")
              | ensure_secret("GOOGLE_ADS_REFRESH_TOKEN")
              | ensure_secret("GOOGLE_ADS_CUSTOMER_ID")
              | ensure_secret("GOOGLE_ADS_LOGIN_CUSTOMER_ID")
              | ensure_secret("ADS_CONVERSION_UPLOAD_ENABLED")
              | ensure_secret("ADS_ENHANCED_CONVERSIONS_ENABLED")
              # GA4 destino (Measurement Protocol) — envía purchase a GA4 para
              # atribución multicanal + audiencias. Params SSM creados 03/06.
              | ensure_secret("GA4_API_SECRET")
              | ensure_secret("GA4_MEASUREMENT_ID")
              | ensure_secret("GA4_UPLOAD_ENABLED")
              | .containerDefinitions[0].healthCheck = {
                  "command": ["CMD-SHELL", "wget -qO- --tries=1 --timeout=4 http://localhost:3000/api/health/db-ready > /tmp/hc.json 2>/dev/null && grep -q \"\\\"ok\\\":true\" /tmp/hc.json || exit 1"],
                  "interval": 30,
                  "timeout": 5,
                  "retries": 3,
                  "startPeriod": 60
                }
              | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
            ' > new-task-def.json

          # 3. Registrar nueva revision con image pineado.
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --region "${{ env.AWS_REGION }}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "Nueva revision: $NEW_TASK_DEF_ARN"

          # 4. Apuntar el service a la nueva revision (rolling deploy).
          aws ecs update-service \
            --cluster vence-backend \
            --service vence-frontend \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --region "${{ env.AWS_REGION }}" \
            --query 'service.[serviceName,deployments[0].rolloutState]' \
            --output text
          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> "$GITHUB_ENV"

      # Esperar a que el rollout termine. Si el task nuevo falla healthcheck,
      # ECS lo revierte automáticamente (circuit breaker) y este step falla.
      - name: Esperar rollout estable
        run: |
          aws ecs wait services-stable \
            --cluster vence-backend \
            --services vence-frontend \
            --region "${{ env.AWS_REGION }}"
          echo "✅ Rollout estable — task nuevo healthy en ALB."

      # Smoke post-deploy del gate anti-scraping: verifica que un usuario NORMAL
      # (usuario smoke, por debajo del umbral) puede cargar preguntas SIN que el
      # gate Turnstile le exija un reto. Es el único momento en que el gate puede
      # cambiar de comportamiento (deploy). El canary vive en el backend (tiene la
      # identidad smoke); aquí solo lo disparamos. continue-on-error: el deploy ya
      # está hecho; un fallo emite alerta [Vence CRITICAL] (RULE_CANARY_QUESTIONS_GATE_FAILED).
      - name: Smoke post-deploy — gate anti-scraping
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INGEST_URL: https://www.vence.es/api/observability/ingest
          INGEST_SECRET: ${{ secrets.OBSERVABILITY_INGEST_SECRET }}
        run: |
          # Emite a observabilidad un fallo de DISPARO (el canary no llegó a correr),
          # para que un disparo roto no sea un punto ciego. NO lo hace en 503: ahí el
          # canary SÍ corrió y el backend ya emitió canary_questions_gate_failed.
          emit_trigger_failure() {
            [ -z "${INGEST_SECRET}" ] && { echo "skip emit — sin INGEST_SECRET"; return; }
            curl -sS -X POST "${INGEST_URL}" \
              -H "Content-Type: application/json" \
              -H "x-ingest-secret: ${INGEST_SECRET}" \
              -d "{\"events\":[{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"source\":\"gha\",\"severity\":\"critical\",\"eventType\":\"canary_questions_gate_failed\",\"errorMessage\":\"Disparo del canary gate no llegó (HTTP $1) en frontend-deploy #${{ github.run_number }}\",\"metadata\":{\"step\":\"trigger_unreachable\",\"httpCode\":\"$1\"}}]}" \
              >/dev/null && echo "→ emitido canary_questions_gate_failed (trigger_unreachable)"
          }

          if [ -z "${CRON_SECRET}" ]; then
            echo "⚠️ CRON_SECRET no configurado — no se puede disparar el canary"
            emit_trigger_failure 0
            exit 0
          fi
          CODE=$(curl -s -o /tmp/gate.json -w '%{http_code}' --max-time 35 \
            -X POST https://api.vence.es/api/v2/canary/run-questions-gate \
            -H "Authorization: Bearer ${CRON_SECRET}" || echo 000)
          echo "HTTP $CODE"; cat /tmp/gate.json 2>/dev/null; echo
          if [ "$CODE" = "200" ]; then
            echo "✅ gate OK — usuario normal carga preguntas sin reto espurio."
          elif [ "$CODE" = "503" ]; then
            echo "⚠️ canary corrió y FALLÓ (503) — el backend ya emitió la alerta [Vence CRITICAL]."
          else
            echo "⚠️ disparo no llegó al canary (HTTP $CODE) — emitiendo a observabilidad."
            emit_trigger_failure "$CODE"
          fi

      # Invalidar CloudFront. Las páginas prerenderizadas (ISR) las cachea
      # CloudFront hasta max_ttl (1 día, ver frontend.tf cache policy
      # frontend_default). Sin esto, un cambio de página estática (p.ej. el
      # SSR del temario en /leyes/[law]) tarda hasta 24h en propagarse a los
      # usuarios y a Googlebot. `/*` cuenta como UN path (free tier: 1000/mes).
      # continue-on-error: la invalidación es una optimización — si fallara
      # (p.ej. permiso IAM no aplicado aún), el contenido se propaga igual en
      # ≤24h por el max_ttl. No debe tumbar un deploy ya exitoso.
      - name: Invalidar CloudFront
        continue-on-error: true
        env:
          # Distribución www/apex/preview-aws.vence.es (cuenta 349744179687).
          CLOUDFRONT_DISTRIBUTION_ID: E1EH4WF1H7ZGLA
        run: |
          ID=$(aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "✅ Invalidación CloudFront creada: $ID (paths /*)"
          echo "- invalidación CloudFront: \`$ID\` (\`/*\`)" >> "$GITHUB_STEP_SUMMARY"

      # Smoke HTTP post-deploy del SITIO REAL (CloudFront → ALB → ECS). Cierra el
      # punto ciego que obligaba a curlear a mano para saber si un deploy acabó
      # bien: si una ruta clave no responde el código esperado, FALLA el job →
      # dispara el job notify-failure (emite workflow_failure a observabilidad).
      #
      # Robusto contra la ventana de propagación multi-edge de CloudFront / la
      # transición del rollout: cada ruta se sondea hasta ~2min y exige 3 aciertos
      # CONSECUTIVOS (no un único hit con suerte) antes de darla por buena.
      - name: Smoke HTTP post-deploy (sitio real)
        run: |
          SMOKE_FAIL=0
          check() {
            local path="$1" expect="$2" ok=0 attempts=0 code=000
            while [ $attempts -lt 24 ]; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://www.vence.es${path}" || echo 000)
              if [ "$code" = "$expect" ]; then ok=$((ok+1)); else ok=0; fi
              if [ $ok -ge 3 ]; then echo "✅ ${path} → ${expect} (estable ×3)"; return 0; fi
              attempts=$((attempts+1)); sleep 5
            done
            echo "❌ ${path}: esperaba ${expect}, último=${code} tras ${attempts} intentos"
            return 1
          }
          # Rutas clave: homepage (SSG) + directorio de oposiciones (server component
          # que lee BD → un build/BD roto da 5xx aquí, no 200). Públicas y estables
          # (no dependen de una feature concreta → no se vuelven brittle).
          check "/" 200 || SMOKE_FAIL=1
          check "/oposiciones" 200 || SMOKE_FAIL=1
          if [ "$SMOKE_FAIL" -ne 0 ]; then
            echo "::error::Smoke HTTP post-deploy FALLÓ — el sitio no sirve rutas clave tras el deploy"
            echo "- ❌ smoke HTTP post-deploy: FALLÓ" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ Smoke HTTP post-deploy OK"
          echo "- ✅ smoke HTTP post-deploy: OK (/ y /oposiciones = 200 estables)" >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        run: |
          echo "## Frontend deployed a AWS ECS" >> "$GITHUB_STEP_SUMMARY"
          echo "- imagen pineada por digest: \`${{ steps.meta.outputs.tag_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- task def revision: \`${NEW_TASK_DEF_ARN}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- service: \`vence-frontend\` en cluster \`vence-backend\` (eu-west-2)" >> "$GITHUB_STEP_SUMMARY"

  # Notificación de fallo a observabilidad (mismo patrón que el resto de workflows).
  notify-failure:
    needs: build-and-push
    if: failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Emit failure to observable_events
        env:
          INGEST_URL: https://www.vence.es/api/observability/ingest
          INGEST_SECRET: ${{ secrets.OBSERVABILITY_INGEST_SECRET }}
        run: |
          if [ -z "${INGEST_SECRET}" ]; then
            echo "skip — OBSERVABILITY_INGEST_SECRET no configurado"
            exit 0
          fi
          curl -sS -X POST "${INGEST_URL}" \
            -H "Content-Type: application/json" \
            -H "x-ingest-secret: ${INGEST_SECRET}" \
            -d "$(cat <<JSON
          {
            "events": [{
              "ts": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "source": "gha",
              "severity": "error",
              "eventType": "workflow_failure",
              "errorMessage": "frontend-deploy run #${{ github.run_number }} failed",
              "metadata": {
                "repo": "${{ github.repository }}",
                "workflow": "frontend-deploy",
                "run_id": "${{ github.run_id }}",
                "sha": "${{ github.sha }}"
              }
            }]
          }
          JSON
          )" || true
