name: Deploy frontend (Bloque 5 Fase E)

# Construye la imagen Docker de Next.js (output:'standalone') y la sube
# al repo ECR `vence-frontend` en eu-west-2.
#
# Este workflow NO actualiza ningún ECS service todavía (E.2 lo añade).
# Solo deja la imagen en ECR para que la próxima etapa pueda referenciarla.
#
# Triggers:
#   - workflow_dispatch (manual): cualquier rama.
#   - push a main: solo si cambia código que afecte al build del frontend.
#     paths-ignore excluye backend/, scripts/, docs/, data/ (mantienen
#     ciclos de despliegue independientes).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - 'docs/**'
      - 'scripts/**'
      - 'data/**'
      - '__tests__/**'
      - '*.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: vence-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compose dos tags: latest + SHA corto. SHA permite rollback puntual,
      # latest permite seguir el "tip de main" con `vence-frontend:latest`.
      - name: Resolve image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_REGISTRY="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "tag_sha=${IMAGE_REGISTRY}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${IMAGE_REGISTRY}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          # Cache cross-builds para no rebajar el next build cada vez.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_latest }}
          # NEXT_PUBLIC_* van como build-args (Next.js los inlinea en el bundle).
          # No-NEXT_PUBLIC vienen del entorno ECS via SSM en runtime.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
            NEXT_PUBLIC_SITE_URL=https://www.vence.es
            NEXT_PUBLIC_APP_NAME=Vence
            NEXT_PUBLIC_SUPPORT_EMAIL=info@vence.es
            NEXT_PUBLIC_USE_CHAT_V2=true

      - name: Summary
        run: |
          echo "## Imagen publicada" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.tag_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.tag_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Para crear/actualizar el service ECS (Fase E.2):" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "AWS_PROFILE=vence terraform apply -var=\"frontend_image_tag=$(echo "${{ github.sha }}" | cut -c1-7)\"" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # Notificación de fallo a observabilidad (mismo patrón que el resto de workflows).
  notify-failure:
    needs: build-and-push
    if: failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Emit failure to observable_events
        env:
          INGEST_URL: https://www.vence.es/api/observability/ingest
          INGEST_SECRET: ${{ secrets.OBSERVABILITY_INGEST_SECRET }}
        run: |
          if [ -z "${INGEST_SECRET}" ]; then
            echo "skip — OBSERVABILITY_INGEST_SECRET no configurado"
            exit 0
          fi
          curl -sS -X POST "${INGEST_URL}" \
            -H "Content-Type: application/json" \
            -H "x-ingest-secret: ${INGEST_SECRET}" \
            -d "$(cat <<JSON
          {
            "events": [{
              "ts": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "source": "gha",
              "severity": "error",
              "eventType": "workflow_failure",
              "errorMessage": "frontend-deploy run #${{ github.run_number }} failed",
              "metadata": {
                "repo": "${{ github.repository }}",
                "workflow": "frontend-deploy",
                "run_id": "${{ github.run_id }}",
                "sha": "${{ github.sha }}"
              }
            }]
          }
          JSON
          )" || true
