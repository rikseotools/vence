name: Tests

# Ejecuta la suite completa en cada PR y push a main.
#
# El pre-commit local solo corre unit tests (rápido). Los tests de
# integración / perf / security pegan a BD real → viven en CI.
#
# Patrón estándar (test pyramid). Ver docs/ARCHITECTURE_ROADMAP.md
# sección «Plan de ejecución activo» bloque 2.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancelar runs viejas del mismo ref si llega una nueva push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  integration:
    name: Integration / perf / security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # No bloquea merges hoy: hay 10 fallos conocidos (bugs datos + flaky)
    # que se irán arreglando uno a uno. Cuando llegue a 0, quitar este flag.
    continue-on-error: true
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run integration / perf / security tests
        env:
          # Estos tests pegan a BD real (read-only en producción + datos snapshot).
          # Suministrados como secrets del repo. Si faltan, el step falla y se
          # ve claro qué pasa — mejor que un timeout silencioso.
          DATABASE_URL: ${{ secrets.DATABASE_URL_READONLY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run test:integration

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # DEUDA CONTROLADA — fecha límite: 2026-06-30
    # 299 errores preexistentes en código de producción (no añadidos por
    # commits recientes — confirmado via git blame en sample). Desglose:
    #   146× react/no-unescaped-entities (comillas en JSX sin escapar)
    #   124× @next/next/no-html-link-for-pages (<a> en vez de <Link>)
    #    22× react-hooks/rules-of-hooks (posibles bugs reales)
    #     7× misc (display-name, no-children-prop, jsx-no-undef)
    # Plan: arreglar en sesión dedicada (2-4h con scripts + revisión
    # manual de los 22 rules-of-hooks). Quitar este flag cuando esté a 0.
    # Tracking: tarea pendiente.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ════════════════════════════════════════════════════════════════
  # Bloque 4 Gap 6 — notificación de fallos a observable_events
  # ════════════════════════════════════════════════════════════════
  # Reporta cualquier fallo de los jobs anteriores como evento
  # `workflow_failed` en observable_events. Permite que el cron
  # `alerts-engine` del backend dispare alerta automática (regla
  # deploy_failed o cron_failure_burst si hay varios).
  #
  # `needs` con `if: failure() && !cancelled()` garantiza que SOLO
  # corre cuando algún job anterior falló (no en éxito ni en cancel
  # por concurrency.cancel-in-progress).
  notify-failure:
    name: Notify failure to observable_events
    if: ${{ failure() && !cancelled() }}
    needs: [unit, integration, lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST to /api/observability/ingest
        env:
          INGEST_SECRET: ${{ secrets.OBSERVABILITY_INGEST_SECRET }}
        run: |
          # Construir payload con metadata del run.
          # `jq` ya disponible en runners ubuntu-latest.
          PAYLOAD=$(jq -n \
            --arg workflow "${{ github.workflow }}" \
            --arg job_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg event "${{ github.event_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg ref "${{ github.ref }}" \
            '{events:[{
              source:"gha",
              severity:"error",
              eventType:"workflow_failed",
              endpoint:$workflow,
              deployVersion:($sha|.[0:8]),
              errorMessage:("Workflow " + $workflow + " falló en " + $event),
              metadata:{
                workflow:$workflow,
                runId:"${{ github.run_id }}",
                runUrl:$job_url,
                actor:$actor,
                ref:$ref,
                attempt:"${{ github.run_attempt }}"
              }
            }]}')

          # Best-effort: si INGEST_SECRET no está configurado o el
          # endpoint cae, NO fallar el step (no queremos amplificar
          # un fallo de CI con un fallo de observability).
          if [ -z "$INGEST_SECRET" ]; then
            echo "⚠️ OBSERVABILITY_INGEST_SECRET no configurado — skipping ingest"
            exit 0
          fi

          curl -sS -X POST 'https://www.vence.es/api/observability/ingest' \
            -H "Content-Type: application/json" \
            -H "x-ingest-secret: $INGEST_SECRET" \
            -d "$PAYLOAD" \
            -o /tmp/ingest.txt \
            -w "HTTP=%{http_code}\n" || echo "curl falló"
          cat /tmp/ingest.txt 2>/dev/null || true
