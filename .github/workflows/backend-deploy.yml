name: Deploy backend

# Despliega el backend NestJS (carpeta backend/) a AWS ECS Fargate.
# Auth vía OIDC — sin claves AWS de larga vida (ver backend/infra/README.md).

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

permissions:
  id-token: write # necesario para OIDC
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: vence-backend
  ECS_CLUSTER: vence-backend
  ECS_SERVICE: vence-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Gate: los tests deben pasar antes de construir y desplegar.
      - name: Install and test
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" backend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stable
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
