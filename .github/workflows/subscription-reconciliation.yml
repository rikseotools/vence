name: Subscription Reconciliation

# Detecta y corrige inconsistencias entre user_subscriptions y user_profiles.plan_type.
# Fallback automático si el webhook de Stripe se pierde un evento.
#
# Cobertura actual:
#   - user_subscriptions.status='active' AND user_profiles.plan_type != 'premium' → corrige
#   - plan_type='premium' sin subscription activa válida → reporta (no degrada)
#
# Limitación conocida (a cerrar en P2 — caso Andrea 2026-05-26):
#   - Stripe tiene subscription active pero user_subscriptions vacío → NO se detecta.
#     Requiere consultar stripe.subscriptions.list directamente en el cron.
#
# Runbook: docs/runbooks/health-check.md
# Incidente origen: webhook Stripe roto 2026-05-26 — Andrea pagó 20€ sin activarse.

on:
  schedule:
    # Cada hora en punto. Cobertura razonable sin saturar:
    # - Si Stripe falla un webhook, máx 60min de retraso en detección
    # - 24 ejecuciones/día × ~30s = 12 min/día = ~360 min/mes (cabe en GHA Pro)
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo reportar, sin aplicar cambios (true/false)'
        required: false
        default: 'false'

jobs:
  reconcile:
    runs-on: ubuntu-latest

    steps:
      - name: Call reconciliation endpoint
        id: reconcile
        run: |
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          URL="https://www.vence.es/api/cron/subscription-reconciliation?dry_run=${DRY}"

          RESPONSE=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${URL}")

          echo "Response: $RESPONSE"

          # Stats
          FIXED=$(echo "$RESPONSE" | jq -r '.fixed // 0')
          INCONSISTENCIES=$(echo "$RESPONSE" | jq -r '.inconsistencies // 0')
          ERRORS=$(echo "$RESPONSE" | jq -r '.errors // 0')

          echo "fixed=$FIXED" >> $GITHUB_OUTPUT
          echo "inconsistencies=$INCONSISTENCIES" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT

          echo "## Subscription Reconciliation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Inconsistencias detectadas: $INCONSISTENCIES" >> $GITHUB_STEP_SUMMARY
          echo "- Corregidas: $FIXED" >> $GITHUB_STEP_SUMMARY
          echo "- Errores: $ERRORS" >> $GITHUB_STEP_SUMMARY

          if [ "$ERRORS" -gt "0" ]; then
            echo "::error::$ERRORS errores durante reconciliación"
            exit 1
          fi

      - name: Emit subscription_drift event
        if: always()
        run: |
          # Emite SIEMPRE (también si detected=0) para que se vea el cron
          # vivo en obs_events. La regla de alertas dispara solo si
          # detected>0 (ver backend/src/alerts/alert-rules.ts RULE_SUBSCRIPTION_DRIFT).
          curl -sS -X POST "https://www.vence.es/api/observability/ingest" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d "{
              \"source\": \"gha\",
              \"severity\": \"info\",
              \"eventType\": \"subscription_drift\",
              \"endpoint\": \"/api/cron/subscription-reconciliation\",
              \"metadata\": {
                \"detected\": ${{ steps.reconcile.outputs.inconsistencies || 0 }},
                \"fixed\": ${{ steps.reconcile.outputs.fixed || 0 }},
                \"errors\": ${{ steps.reconcile.outputs.errors || 0 }},
                \"run_id\": \"${{ github.run_id }}\"
              }
            }" || true

      - name: Notify failure to observability
        if: failure()
        run: |
          curl -sS -X POST "https://www.vence.es/api/observability/ingest" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{
              "source": "gha",
              "severity": "error",
              "eventType": "cron_run",
              "endpoint": "/api/cron/subscription-reconciliation",
              "errorMessage": "GHA workflow subscription-reconciliation failed",
              "metadata": {"run_id": "${{ github.run_id }}", "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
            }' || true
